<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記事研修管理WBS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      font-size: 14px;
    }

    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .today { font-size: 12px; color: #8892b0; }

    .tabs { background: #16213e; display: flex; padding: 0 28px; gap: 4px; }
    .tab-btn {
      padding: 11px 20px;
      cursor: pointer;
      color: #8892b0;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: all 0.15s;
      user-select: none;
    }
    .tab-btn:hover { color: #ccd6f6; }
    .tab-btn.active { color: #64ffda; border-bottom-color: #64ffda; }

    .content { padding: 24px 28px; }
    .person-panel { display: none; }
    .person-panel.active { display: block; }

    .sec-heading {
      font-size: 12px;
      font-weight: 700;
      color: #8892b0;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      margin-top: 24px;
    }
    .sec-heading:first-child { margin-top: 0; }

    .table-wrap {
      overflow-x: auto;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    thead { background: #1a1a2e; }
    th {
      padding: 8px 10px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: #8892b0;
      white-space: nowrap;
    }
    th.group-header {
      text-align: center;
      color: #64ffda;
      border-bottom: 1px solid #2d3748;
      font-size: 11px;
    }
    th.sub-header {
      text-align: center;
      color: #8892b0;
      font-size: 10px;
      font-weight: 600;
    }
    td {
      padding: 6px 10px;
      border-bottom: 1px solid #f0f2f5;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafbfc; }

    td.col-no { color: #c5c8d3; font-size: 12px; text-align: center; width: 36px; }
    th.col-no { text-align: center; }

    .kw-input {
      width: 100%;
      min-width: 160px;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      color: #1a1a2e;
      outline: none;
      padding: 2px 4px;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .kw-input:focus { border-bottom-color: #64ffda; background: #f8f9fa; }
    .kw-input::placeholder { color: #c5c8d3; font-weight: 400; }

    .date-input {
      border: none;
      background: transparent;
      font-size: 11px;
      color: #8892b0;
      outline: none;
      padding: 2px 4px;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
      width: 110px;
      cursor: pointer;
    }
    .date-input:focus { border-bottom-color: #64ffda; color: #1a1a2e; }

    .status-select {
      border: none;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      text-align: center;
      min-width: 80px;
    }
    .status-select:focus { outline: 2px solid #64ffda; outline-offset: 1px; }

    .memo-textarea {
      width: 100%;
      min-height: 100px;
      border: none;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 14px 16px;
      font-size: 13px;
      color: #1a1a2e;
      resize: vertical;
      outline: none;
      font-family: inherit;
      line-height: 1.8;
    }
    .memo-textarea:focus { outline: 2px solid #64ffda; }
    .memo-textarea::placeholder { color: #c5c8d3; }
  </style>
</head>
<body>

<div class="header">
  <h1>記事研修管理WBS</h1>
  <span class="today" id="today-label"></span>
</div>

<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>

<script>
const PERSONS = ['有方', '稲井', '今野', '田村'];
const ARTICLE_COUNT = 9;
const STATUS_OPTS = ['未着手', '作業中…', 'FB中', '完了'];
const PROGRESS_OPTS = ['—', 'オンスケ', '遅延', '前倒し'];

const STATUS_STYLE = {
  '未着手':  { bg: '#f0f2f5', color: '#aab0c0' },
  '作業中…': { bg: '#e8f4fd', color: '#2980b9' },
  'FB中':   { bg: '#fff8e6', color: '#d68910' },
  '完了':   { bg: '#e8f8f0', color: '#27ae60' },
  'オンスケ':{ bg: '#e8f8f0', color: '#27ae60' },
  '遅延':   { bg: '#fdf0f0', color: '#e74c3c' },
  '前倒し': { bg: '#e8f4fd', color: '#2980b9' },
  '—':     { bg: '#f0f2f5', color: '#c5c8d3' },
};

function defaultData() {
  return PERSONS.map(name => ({
    name,
    articles: Array.from({ length: ARTICLE_COUNT }, () => ({
      kw: '',
      kotsushi: '未着手',
      honbun: '未着手',
      startPlan: '',
      startActual: '',
      endPlan: '',
      endActual: '',
      progress: '—'
    })),
    memo: ''
  }));
}

function loadData() {
  try {
    const saved = localStorage.getItem('wbs_data');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return defaultData();
}

function saveData() {
  localStorage.setItem('wbs_data', JSON.stringify(data));
}

let data = loadData();
let currentPanel = 0;

function applySelectStyle(sel) {
  const s = STATUS_STYLE[sel.value] || STATUS_STYLE['—'];
  sel.style.background = s.bg;
  sel.style.color = s.color;
}

function makeSelect(opts, value, onChange) {
  const sel = document.createElement('select');
  sel.className = 'status-select';
  opts.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o;
    opt.textContent = o;
    if (o === value) opt.selected = true;
    sel.appendChild(opt);
  });
  applySelectStyle(sel);
  sel.addEventListener('change', () => {
    applySelectStyle(sel);
    onChange(sel.value);
  });
  return sel;
}

function makeKwInput(value, onChange) {
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'kw-input';
  inp.value = value;
  inp.placeholder = 'KWを入力';
  inp.addEventListener('input', () => onChange(inp.value));
  return inp;
}

function makeDateInput(value, onChange) {
  const inp = document.createElement('input');
  inp.type = 'date';
  inp.className = 'date-input';
  if (value) inp.value = value;
  inp.addEventListener('change', () => onChange(inp.value));
  return inp;
}

function td(child) {
  const el = document.createElement('td');
  if (child) el.appendChild(child);
  return el;
}

function renderPanel(personIdx) {
  const person = data[personIdx];
  const panel = document.createElement('div');
  panel.className = 'person-panel' + (personIdx === currentPanel ? ' active' : '');
  panel.id = `panel-${personIdx}`;

  // ---- 記事進捗テーブル ----
  const heading1 = document.createElement('div');
  heading1.className = 'sec-heading';
  heading1.textContent = '記事進捗';
  panel.appendChild(heading1);

  const wrap = document.createElement('div');
  wrap.className = 'table-wrap';
  const table = document.createElement('table');

  // ヘッダー 2行
  const thead = document.createElement('thead');

  const tr1 = document.createElement('tr');
  [
    { text: 'No.',    rowspan: 2, cls: 'col-no' },
    { text: 'KW',     rowspan: 2 },
    { text: '骨子作成', rowspan: 2 },
    { text: '本文提出', rowspan: 2 },
    { text: '開始日',  colspan: 2, cls: 'group-header' },
    { text: '終了日',  colspan: 2, cls: 'group-header' },
    { text: '進捗',   rowspan: 2 },
  ].forEach(h => {
    const th = document.createElement('th');
    th.textContent = h.text;
    if (h.rowspan) th.rowSpan = h.rowspan;
    if (h.colspan) th.colSpan = h.colspan;
    if (h.cls) th.className = h.cls;
    tr1.appendChild(th);
  });
  thead.appendChild(tr1);

  const tr2 = document.createElement('tr');
  ['予定', '実際', '予定', '実際'].forEach(t => {
    const th = document.createElement('th');
    th.textContent = t;
    th.className = 'sub-header';
    tr2.appendChild(th);
  });
  thead.appendChild(tr2);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  person.articles.forEach((art, ai) => {
    const tr = document.createElement('tr');

    const tdNo = document.createElement('td');
    tdNo.className = 'col-no';
    tdNo.textContent = ai + 1;
    tr.appendChild(tdNo);

    tr.appendChild(td(makeKwInput(art.kw, v => {
      data[personIdx].articles[ai].kw = v; saveData();
    })));

    tr.appendChild(td(makeSelect(STATUS_OPTS, art.kotsushi, v => {
      data[personIdx].articles[ai].kotsushi = v; saveData();
    })));

    tr.appendChild(td(makeSelect(STATUS_OPTS, art.honbun, v => {
      data[personIdx].articles[ai].honbun = v; saveData();
    })));

    tr.appendChild(td(makeDateInput(art.startPlan, v => {
      data[personIdx].articles[ai].startPlan = v; saveData();
    })));

    tr.appendChild(td(makeDateInput(art.startActual, v => {
      data[personIdx].articles[ai].startActual = v; saveData();
    })));

    tr.appendChild(td(makeDateInput(art.endPlan, v => {
      data[personIdx].articles[ai].endPlan = v; saveData();
    })));

    tr.appendChild(td(makeDateInput(art.endActual, v => {
      data[personIdx].articles[ai].endActual = v; saveData();
    })));

    tr.appendChild(td(makeSelect(PROGRESS_OPTS, art.progress, v => {
      data[personIdx].articles[ai].progress = v; saveData();
    })));

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  wrap.appendChild(table);
  panel.appendChild(wrap);

  // ---- メモ ----
  const heading2 = document.createElement('div');
  heading2.className = 'sec-heading';
  heading2.textContent = 'スケジュール・メモ';
  panel.appendChild(heading2);

  const memo = document.createElement('textarea');
  memo.className = 'memo-textarea';
  memo.placeholder = '予定やメモを自由に入力（例：5/27 骨子提出締め切り）';
  memo.value = person.memo;
  memo.addEventListener('input', () => {
    data[personIdx].memo = memo.value; saveData();
  });
  panel.appendChild(memo);

  return panel;
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  PERSONS.forEach((name, i) => {
    const btn = document.createElement('div');
    btn.className = 'tab-btn' + (i === currentPanel ? ' active' : '');
    btn.textContent = name;
    btn.addEventListener('click', () => {
      currentPanel = i;
      document.querySelectorAll('.tab-btn').forEach((b, idx) => b.classList.toggle('active', idx === i));
      document.querySelectorAll('.person-panel').forEach((p, idx) => p.classList.toggle('active', idx === i));
    });
    tabsEl.appendChild(btn);
  });
}

function renderAll() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  PERSONS.forEach((_, i) => content.appendChild(renderPanel(i)));
  renderTabs();
}

document.getElementById('today-label').textContent =
  '今日：' + new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' });

renderAll();
</script>
</body>
</html>
